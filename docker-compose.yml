services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: secureflow
      POSTGRES_PASSWORD: secureflow
      POSTGRES_DB: secureflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureflow -d secureflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9002:9002"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://secureflow:secureflow@db:5432/secureflow

volumes:
  postgres_data:
